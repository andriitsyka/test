<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img id="currentPhoto" src="images/photo1.jpg">

<button onclick="showNextPhoto()">Наступне</button>

<script>
var photosCount = 4;
var currentPhotoIndex = 1;

function showNextPhoto() {
    currentPhotoIndex++;

    if (currentPhotoIndex > photosCount) {
currentPhotoIndex = 1;
    }

    document.getElementById("currentPhoto").src =
"images/photo" + currentPhotoIndex + ".jpg";
}
</script>

<style>
img {
    max-width: 300px;
}
</style>
</body>
</head>
</html>
